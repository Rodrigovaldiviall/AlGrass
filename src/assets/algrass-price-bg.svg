<svg xmlns="http://www.w3.org/2000/svg" width="240" height="120" viewBox="0 0 240 120">
  <defs>
    <filter id="blur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>

    <radialGradient id="grass" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#7ccf52"/>
      <stop offset="100%" stop-color="#a6df84" stop-opacity="0.15"/>
    </radialGradient>
  </defs>

  <ellipse
    cx="120"
    cy="60"
    rx="100"
    ry="42"
    fill="url(#grass)"
    filter="url(#blur)"
  />

  <circle
    cx="120"
    cy="60"
    r="32"
    fill="none"
    stroke="white"
    stroke-opacity="0.75"
    stroke-width="3"
    filter="url(#blur)"
  />

  <line
    x1="20"
    y1="60"
    x2="220"
    y2="60"
    stroke="white"
    stroke-opacity="0.7"
    stroke-width="3"
    filter="url(#blur)"
  />
</svg>
